<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Video2Mesh Admin</title>
    <meta name="description" content="Video2Mesh 管理员界面。" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <header class="admin-topbar">
        <a class="brand" href="./" aria-label="返回公开文档站">
          <span class="brand-mark">V2M</span>
          <span>
            <strong>Video2Mesh</strong>
            <em>Admin</em>
          </span>
        </a>
        <span id="apiStatus" class="status-pill">未连接</span>
      </header>

      <section class="admin-panel" aria-label="本机 API 连接">
        <div class="admin-heading">
          <div>
            <h1>Local Control</h1>
            <p>登录后管理 Markdown 同步、项目记录和 Codex 任务队列。</p>
          </div>
          <a class="admin-link" href="./">公开首页</a>
        </div>
        <div class="api-connect-grid">
          <label>
            <span>API 地址</span>
            <input id="apiUrlInput" type="url" placeholder="https://api.relumeow.top" autocomplete="off" />
          </label>
          <button id="apiHealthCheck" type="button">连接</button>
        </div>
      </section>

      <section class="auth-grid" aria-label="登录与会话">
        <form id="loginForm" class="stack-form auth-card">
          <h2>登录 Mac 会话</h2>
          <input name="username" type="text" placeholder="用户名" autocomplete="username" required />
          <input name="password" type="password" placeholder="密码" autocomplete="current-password" required />
          <button type="submit">登录</button>
          <button id="githubLoginButton" class="github-button" type="button">GitHub 授权登录</button>
        </form>

        <form id="setupForm" class="stack-form auth-card">
          <h2>首次创建管理员</h2>
          <input name="bootstrap_token" type="password" placeholder="Bootstrap token" autocomplete="off" required />
          <input name="username" type="text" placeholder="用户名" autocomplete="username" required />
          <input name="password" type="password" placeholder="至少 10 位密码" autocomplete="new-password" required />
          <button type="submit">创建并登录</button>
        </form>

        <section class="auth-card session-card" aria-label="当前会话">
          <h2>当前会话</h2>
          <p id="sessionInfo">尚未登录。只有登录后才能访问 Mac 控制接口。</p>
          <button id="logoutButton" type="button">退出登录</button>
        </section>
      </section>

      <section class="control-grid" aria-label="管理功能">
        <article class="control-card">
          <header>
            <h2>项目记录</h2>
            <button id="refreshProjects" type="button">刷新</button>
          </header>
          <div id="projectList" class="record-list"></div>
          <form id="projectForm" class="stack-form">
            <input name="name" type="text" placeholder="项目名，例如 Video2Mesh / PaperReading" required />
            <input name="repo" type="text" placeholder="本地路径或仓库 URL" />
            <input name="summary" type="text" placeholder="最近进展 / 备注" />
            <button type="submit">添加项目</button>
          </form>
        </article>

        <article class="control-card">
          <header>
            <h2>Codex 任务队列</h2>
            <button id="refreshTasks" type="button">刷新</button>
          </header>
          <div id="taskList" class="record-list"></div>
          <form id="taskForm" class="stack-form">
            <input name="project" type="text" placeholder="所属项目" value="Video2Mesh" />
            <select name="priority" aria-label="优先级">
              <option value="normal">normal</option>
              <option value="high">high</option>
              <option value="low">low</option>
            </select>
            <textarea name="prompt" rows="5" placeholder="从手机发给这台电脑上 Codex 的任务..." required></textarea>
            <button type="submit">加入队列</button>
          </form>
        </article>

        <article class="control-card md-sync-card">
          <header>
            <h2>远程同步 Markdown</h2>
          </header>
          <form id="remoteDocForm" class="stack-form">
            <input name="title" type="text" placeholder="文档标题" required />
            <div class="inline-fields">
              <input name="category" type="text" placeholder="分类" value="Remote" />
              <input name="tags" type="text" placeholder="标签，用逗号分隔" />
            </div>
            <input name="summary" type="text" placeholder="摘要，可选" />
            <textarea name="markdown" rows="12" placeholder="# 新文档&#10;&#10;Codex 可以把写好的 Markdown 通过这个 API 同步进网站。" required></textarea>
            <button type="submit">同步到网站</button>
          </form>
        </article>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
